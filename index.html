<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="stayles/app.css">
    <title>NovaBlog</title>
</head>

<body>
    <section class="hero">
        <div class="container">
            <header class="header">
                <div class="header-logo">
                    <a href="#" class="logo">NovaBlog.</a>
                </div>
                <nav class="header-nav">
                    <ul class="nav-list">
                        <li class="nav-item">
                            <a href="#">Home</a>
                        </li>
                        <li class="nav-item">
                            <a href="#">About</a>
                        </li>
                        <li class="nav-item">
                            <a href="#">Categories</a>
                        </li>
                        <li class="nav-item">
                            <a href="#">Blog</a>
                        </li>
                        <li class="nav-item">
                            <a href="#">Contact</a>
                        </li>
                    </ul>
                </nav>
                <div class="header-actions">
                    <button class="search-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            class="search">
                            <path d="m21 21-4.34-4.34" />
                            <circle cx="11" cy="11" r="8" />
                        </svg>
                    </button>
                    <a href="#" class="profile">
                        <img src="images/profile.jpg" alt="Profile User" class="image-profile">
                    </a>
                </div>
            </header>
            <div class="hero-content">
                <span class="hero-subtitle">
                    WELCOME TO MY BLOG
                </span>
                <h1 class="hero-title">
                    Thoughts, stories and <span class="word-hero-title">ideas.</span>
                </h1>
                <p class="hero-description">
                    A blog about minimalism, productivity, design and living a meaningful life.
                </p>
                <a href="#" class="hero-btn">
                    <span class="hero-btn-text">
                        Explore Articles
                    </span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="icon-arrow-right">
                        <path d="M5 12h14" />
                        <path d="m12 5 7 7-7 7" />
                    </svg>
                </a>
            </div>
        </div>
    </section>
</body>

</html>
